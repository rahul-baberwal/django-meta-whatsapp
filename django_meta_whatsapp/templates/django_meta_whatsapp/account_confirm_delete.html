{% extends "django_meta_whatsapp/base.html" %}
{% block title %}Delete{% endblock %}
{% block page_title %}Delete{% endblock %}
{% block content %}
<div class="max-w-md">
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <p class="text-sm text-gray-600 mb-5">Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit" class="inline-flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-5 py-2 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete</button>
      <a href="{% url 'django_meta_whatsapp:account_list' %}" class="inline-flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-5 py-2 rounded-lg">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
